<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>M|Systems Solutions</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    min-height:100vh;
    padding:20px;

    /* Wallpaper */
    background-image:url("");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    color:white;
}

/* Dark overlay */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(10,15,30,.6);
    z-index:-1;
}

/* Layout */
.container{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    min-height:calc(100vh - 40px);
}

/* Panels */
.panel{
    display:flex;
    flex-direction:column;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.15);
    border-radius:10px;

    box-shadow:
        0 8px 8px rgba(0,0,0,.3);

    overflow:hidden;
}

/* Header */
.panel-header{
    padding:20px;
    background:rgba(255,255,255,.08);
    border-bottom:1px solid rgba(255,255,255,.1);
    text-align:center;
    font-size:1.3rem;
    font-weight:bold;
}

/* Content */
.panel-content{
    flex:1;
    padding:20px;

    overflow-y:auto;

    scrollbar-width:thin;
}

/* Example styles for future elements */
table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:5px;
    border:1px solid rgba(255,255,255,.1);
}

canvas,
iframe,
img{
    width:100%;
    max-width:100%;
    border-radius:15px;
}

/* Custom scrollbar */
.panel-content::-webkit-scrollbar{
    width:8px;
}

.panel-content::-webkit-scrollbar-thumb{
    background:rgba(255,255,255,.3);
    border-radius:10px;
}

/* Tablet */
@media (max-width:1000px){

    .container{
        grid-template-columns:1fr;
    }

    .panel{
        min-height:500px;
    }

}

/* Small phones */
@media (max-width:600px){

    body{
        padding:10px;
    }

    .container{
        gap:15px;
    }

    .panel{
        min-height:400px;
    }

    .panel-header{
        font-size:1.1rem;
        padding:15px;
    }

    .panel-content{
        padding:15px;
    }

}

  h2 {
    text-align: center;
  }

  label {
    display: block;
    margin-top: 10px;
  }

  select, input {
    width: 32%;
    padding: 6px;
    margin-top: 5px;
    border-radius: 8px;
    border: none;
    font-size: 11px;
  }

   button {
    width: 100%;
    padding: 6px;
    margin-top: 5px;
    border-radius: 8px;
    border: none;
    font-size: 11px;
    background: #22c55e;
    color: white;
    cursor: pointer;
    margin-top: 5px;
  }

  button:hover {
    background: #16a34a;
  }

  table {
    width: 100%;
    margin-top: 10px;
    border-collapse: collapse;
  }

  th, td {
    padding: 5px;
    border-bottom: 1px solid #334155;
    text-align: center;
    align-items: center;
    justify-content: center;
  }

  th {
    background: #0b1220;
  }

  .delete-btn {
    background: #ef4444;
    padding: 5px 5px;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    border: none;
  }

  .filters {
    margin-top: 20px;
    padding: 5px;
    background: #0b1220;
    border-radius: 10px;
  }
</style>
</head>
<body>

<div class="container">

    <!-- Panel 1 -->
    <section class="panel">

        <div class="panel-header">
            Funds
        </div>

        <div class="panel-content">

            <!-- Place charts, tables, frames, etc. -->

        </div>

    </section>

    <!-- Panel 2 -->
    <section class="panel">

        <div class="panel-header">
            Savings
        </div>

        <div class="panel-content">

            <!-- Place charts, tables, frames, etc. -->

        </div>

    </section>

    <!-- Panel 3 -->
    <section class="panel">

        <div class="panel-header">
            Investment
        </div>

        <div class="panel-content">

  <!-- INPUTS -->
  <input type="date" id="dateInput">

  <input type="number" id="amountInput" placeholder="Enter amount">

  <select id="accountInput">
    <option>Select</option>
    <option>MP2 - Account 1</option>
    <option>MP2 - Account 2</option>
    <option>MP2 - Account 3</option>
    <option>MP2 - Account 4</option>
    <option>MP2 - Account 5</option>
  </select>


  <button onclick="addEntry()">Add Entry</button>

  <!-- FILTERS -->
  <div class="filters">
    <h3>Filters</h3>

    <input type="date" id="fromDate" onchange="renderTable()">
    <input type="date" id="toDate" onchange="renderTable()">

    <select id="filterAccount" onchange="renderTable()">
      <option value="">All Accounts</option>
      <option>MP2 - Account 1</option>
      <option>MP2 - Account 2</option>
      <option>MP2 - Account 3</option>
      <option>MP2 - Account 4</option>
      <option>MP2 - Account 5</option>
    </select>

    <button onclick="clearFilters()">Clear Filters</button>
  </div>

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Account</th>
        <th>Amount</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

        </div>

    </section>

</div>
<script>
let data = JSON.parse(localStorage.getItem("mp2Data")) || [];

function addEntry() {
  const date = document.getElementById("dateInput").value;
  const account = document.getElementById("accountInput").value;
  const amount = document.getElementById("amountInput").value;

  if (!date || !amount) {
    alert("Please fill in date and amount");
    return;
  }

  data.push({ date, account, amount });
  saveAndRender();

  document.getElementById("amountInput").value = "";
}

function renderTable() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  const accountFilter = document.getElementById("filterAccount").value;
  const fromDate = document.getElementById("fromDate").value;
  const toDate = document.getElementById("toDate").value;

  const filtered = data.filter(item => {
    const matchAccount = !accountFilter || item.account === accountFilter;
    const matchFrom = !fromDate || item.date >= fromDate;
    const matchTo = !toDate || item.date <= toDate;

    return matchAccount && matchFrom && matchTo;
  });

  filtered.forEach((item, index) => {
    tbody.innerHTML += `
      <tr>
        <td>${item.date}</td>
        <td>${item.account}</td>
        <td>₱${parseFloat(item.amount).toLocaleString()}</td>
        <td><button class="delete-btn" onclick="deleteEntry(${index})">X</button></td>
      </tr>
    `;
  });

  localStorage.setItem("mp2Data", JSON.stringify(data));
}

function deleteEntry(index) {
  data.splice(index, 1);
  saveAndRender();
}

function clearFilters() {
  document.getElementById("filterAccount").value = "";
  document.getElementById("fromDate").value = "";
  document.getElementById("toDate").value = "";
  renderTable();
}

function saveAndRender() {
  localStorage.setItem("mp2Data", JSON.stringify(data));
  renderTable();
}

renderTable();
</script>

</body>
</html>
